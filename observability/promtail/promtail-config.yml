server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push
    batchsize: 102400

scrape_configs:
  - job_name: docker-logs
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s

    relabel_configs:
      - source_labels: [ __meta_docker_container_label_logging ]
        target_label: appName   # <- теперь stream будет иметь label appName
        action: replace
      - source_labels: [ __meta_docker_container_name ]
        target_label: container
        action: replace

    pipeline_stages:
      - docker: {}
      - json:
          field: log
          expressions:
            level: level
            time: time
            env: env
            appName: appName
            correlationId: correlationId
            levelName: levelName
            ctx: ctx
            msg: msg
            method: method
            path: path
            stack: stack
