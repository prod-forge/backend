name: CI

on:
  push:
    branches:
      - main

jobs:
  lint:
    name: Linting
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma types
        run: npm run db:generate

      - name: Linting
        run: npm run lint

  unit-tests:
    needs: lint
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma types
        run: npm run db:generate

      - name: Unit Tests
        run: npm test

  e2e-tests:
    needs: unit-tests
    name: E2E Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate .env
        uses: ./.github/actions/generate-env
        with:
          DATABASE_SSL: false
          LOG_PRETTY: false

      - name: Generate Prisma types
        run: npm run db:generate

      - name: Run e2e tests
        run: npm run test:e2e

  build:
    name: Build Application
    runs-on: ubuntu-latest
    needs: e2e-tests

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Generate .env
        uses: ./.github/actions/generate-env
        with:
          DATABASE_SSL: true
          LOG_PRETTY: false

      - name: Set up Docker Compose
        run: docker compose -f docker-compose.yml build production
