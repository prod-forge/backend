name: Rollback ECS Revision

on:
  workflow_dispatch:
    inputs:
      task_revision:
        description: 'Task definition revision (for example: my-service:23)'
        required: true

env:
  AWS_REGION: eu-central-1
  TASK_NAME: prod-forge-todolist-task
  ECS_CLUSTER: prod-forge-todolist-cluster
  ECS_SERVICE: prod-forge-todolist-service

permissions:
  id-token: write
  contents: read

jobs:
  rollback:
    environment: prod
    runs-on: ubuntu-latest
    name: Rollback ECS Revision

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::${{ vars.USER_ID }}:role/github-actions-ecs-ecr-role
          aws-region: eu-central-1

      - name: Rollback ECS service
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service ${{ env.ECS_SERVICE }} \
            --task-definition ${TASK_NAME}:${{ github.event.inputs.task_revision }} \
            --desired-count 1 \
            --force-new-deployment \
            --no-cli-pager \
            > /dev/null

      - name: Wait for deployment to finish
        run: |
          echo "Waiting for ECS deployment to stabilize..."

          aws ecs wait services-stable \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services ${{ env.ECS_SERVICE }}

          echo "Deployment completed successfully!"
